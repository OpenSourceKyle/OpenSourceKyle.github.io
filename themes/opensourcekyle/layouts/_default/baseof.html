<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    {{ $styles := resources.Get "css/style.css.html" | resources.ExecuteAsTemplate "style.css" . | minify | fingerprint }}
    <link rel="stylesheet" href="{{ $styles.Permalink }}">
    <!-- Add Font Awesome for the LinkTree icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <script>
        document.body.style.backgroundImage = "url('{{ .Site.Params.backgroundImage }}')";
        document.body.style.backgroundRepeat = "no-repeat";
        document.body.style.backgroundPosition = "center center";
        document.body.style.backgroundAttachment = "fixed";
        document.body.style.backgroundSize = "cover";
    </script>
    
    <!-- Add floating social media buttons -->
    <div class="social-float-container">
        <a href="https://linktr.ee/your_linktree_handle" target="_blank" class="social-float">
            <i class="fa-solid fa-tree"></i>
        </a>
    </div>
    <header>
        <nav>
            <div class="navbar-container">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <a href="{{ "/" | relURL }}" class="navbar-title" style="font-size: 2em;"> {{ .Site.Title }}</a>
                    <div class="navbar-links">
                        <a href="{{ "/about/" | relURL }}">About</a>
                        <a href="{{ "/pages/" | relURL }}">Pages</a>
                        <a href="{{ "/blog/" | relURL }}">Blog</a>
                        <a href="{{ "/coaching/" | relURL }}">Coaching</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    <footer>
        <!-- Add your site footer here -->
    </footer>
</body>
</html>
