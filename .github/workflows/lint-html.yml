name: Lint HTML

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '16'

    - name: Install HTMLHint
      run: npm install -g htmlhint

    - name: Run HTMLHint
      run: htmlhint "public/**/*.html"
