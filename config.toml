baseURL = "http://opensourcekyle.com"
languageCode = "en-us"
title = "OpenSourceKyle"
theme = "hugo-opensourcekyle-theme"

[params]
  backgroundImage = "/images/galaxy.jpg"
  wordsPerMinute = 150  # Adjust this number to change reading speed estimate
  profileImage = "/images/myface.jpg"
  logo = "/images/logo/logo_head.png"  # Path to your logo image
  logoWidth = "1200"  # Recommended width for social media previews
  logoHeight = "630"  # Recommended height for social media previews
  logoAlt = "OpenSourceKyle Logo"  # Alt text for accessibility and SEO
  description = "Open Source Kyle - Life is one big experiment"
  linktreeUrl = "https://linktr.ee/OpenSourceKyle"
  linktreeLogo = "/images/linktree_logo.png"  # Path relative to static folder
  pagesToShow = 6
  headerLinks = [
    { text = "About", url = "/about/" },
    { text = "Pages", url = "/pages/" },
    { text = "Blog", url = "/blog/" },
    { text = "Coaching", url = "/coaching/" },
  ]
  footerLinks = [
    { text = "Privacy Policy", url = "/privacy" },
    { text = "Terms of Service", url = "/terms" },
    { text = "RSS", url = "/index.xml" },
    { text = "Sitemap (Human)", url = "/sitemap" },
    { text = "Sitemap (XML)", url = "/sitemap.xml" },
  ]
  footerText = "Kyle. CC BY-NC 4.0. Some rights reserved."
  footerLink = "https://creativecommons.org/licenses/by-nc/4.0/"

[params.colors]
  headerText = "#ffffff"  # Medium gray for text
  background = "#121212"  # Dark background
  sectionBackground = "#1f1f1f"  # Slightly lighter dark gray
  link = "#0AFF00"  # Light gray for links
  linkHover = "#f900ed"  # Darker gray for hover
  paragraphText = "#b2b2b2"  # Light gray for paragraphs
  socialButtonBackground = "#2a2a2a" # Lighter dark gray for social button

[params.theme]
  transparency = "0.9"  # Value between 0 and 1

[frontmatter]
  date = ["date", "publishDate", ":filename", ":default"]

[permalinks]
  blog = "/blog/:year/:month/:day/:title/"
  pages = "/pages/:slug/"
  about = "/about/"
  coaching = "/coaching/"
  tags = "/tags/:slug/"

[taxonomies]
  category = "categories"
  tag = "tags"

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"